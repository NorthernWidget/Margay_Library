name: Deploy Doxygen docs to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Doxygen
        run: sudo apt-get install -y doxygen

      - name: Build Doxygen XML
        run: doxygen doxygen_NW.cfg

      - name: Cache Doxybook2
        id: cache-doxybook2
        uses: actions/cache@v4
        with:
          path: doxybook2
          key: doxybook2-v1.4.0-linux-amd64

      - name: Download Doxybook2
        if: steps.cache-doxybook2.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/matusnovak/doxybook2/releases/download/v1.4.0/doxybook2-linux-amd64-v1.4.0.zip
          unzip -q doxybook2-linux-amd64-v1.4.0.zip -d doxybook2
          chmod +x doxybook2/bin/doxybook2

      - name: Run Doxybook2
        run: |
          mkdir -p _site
          doxybook2/bin/doxybook2 \
            --input xml \
            --output _site \
            --config .doxybook/config.json

      - name: Show Doxybook2 output structure
        run: find _site -name "*.md" | sort

      - name: Add Minimal Mistakes front matter
        run: |
          python3 - <<'EOF'
          import os

          site_dir = "_site"
          insert_lines = [
              "layout: single\n",
              "render_with_liquid: false\n",
              "toc: true\n",
              "toc_sticky: true\n",
              "sidebar:\n",
              "  nav: api\n",
          ]

          for root, dirs, files in os.walk(site_dir):
              for fname in files:
                  if not fname.endswith(".md"):
                      continue
                  fpath = os.path.join(root, fname)
                  with open(fpath) as f:
                      lines = f.readlines()

                  if lines and lines[0].strip() == "---":
                      fm_end = None
                      for i, line in enumerate(lines[1:], 1):
                          if line.strip() == "---":
                              lines[i:i] = insert_lines
                              fm_end = i + len(insert_lines) + 1
                              break
                      else:
                          lines = ["---\n"] + insert_lines + ["---\n\n"] + lines
                          fm_end = 1 + len(insert_lines) + 1
                  else:
                      lines = ["---\n"] + insert_lines + ["---\n\n"] + lines
                      fm_end = 1 + len(insert_lines) + 1

                  # Strip the first heading from the body (duplicates front matter title
                  # rendered by Minimal Mistakes layout)
                  if fm_end is not None:
                      i = fm_end
                      while i < len(lines) and lines[i].strip() == "":
                          i += 1
                      if i + 1 < len(lines) and set(lines[i + 1].strip()) <= {"="}  and lines[i + 1].strip():
                          # setext H1: title line + ==== underline
                          del lines[i:i + 2]
                      elif i < len(lines) and lines[i].startswith("# "):
                          # ATX H1
                          del lines[i]

                  with open(fpath, "w") as f:
                      f.writelines(lines)
                  print(f"Processed: {fpath}")
          EOF

      - name: Use README as index page
        run: |
          printf -- "---\nlayout: single\ntoc: false\nsidebar:\n  nav: api\n---\n\n" > _site/index.md
          cat README.md >> _site/index.md

      - name: Copy Jekyll support files
        run: |
          cp _docs/_config.yml _site/_config.yml
          cp _docs/Gemfile _site/Gemfile
          cp -r _docs/_data _site/_data

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install Jekyll dependencies
        run: cd _site && bundle install

      - name: Build Jekyll site
        run: cd _site && bundle exec jekyll build --destination ../_built

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_built
